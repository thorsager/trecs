name: Integration Tests

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  integration_tests:
    name: "Integration tests"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ^1.26

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sipsak
          sudo apt-get install -y libsox-dev sox
          sudo apt-get install -y build-essential git pkg-config libasound2-dev libssl-dev libv4l-dev libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libopus-dev libgsm1-dev libspeexdsp-dev

      - name: Build and install pjsip
        run: |
          git clone --depth 1 --branch 2.16 https://github.com/pjsip/pjproject.git /tmp/pjproject
          cd /tmp/pjproject
          ./configure --prefix=/usr --disable-sound --disable-video --disable-resample --disable-sdl --disable-ffmpeg --disable-libyuv --disable-libwebrtc 2>&1 | tail -30
          make -j$(nproc) 2>&1 | tail -30
          sudo make install
          sudo ldconfig
          # Find and install pjsua binary
          PJSUA_BIN=$(find /tmp/pjproject/pjsip-apps/bin -name "pjsua*" -type f 2>/dev/null | head -1)
          if [ -n "$PJSUA_BIN" ]; then
            echo "Found pjsua: $PJSUA_BIN"
            sudo cp "$PJSUA_BIN" /usr/bin/pjsua
            sudo chmod +x /usr/bin/pjsua
          else
            echo "ERROR: pjsua binary not found in build tree"
            find /tmp/pjproject -name "pjsua*" 2>/dev/null | head -10
            exit 1
          fi
          echo "--- verify pjsua ---"
          which pjsua
          pjsua --version 2>&1 | head -5 || true

      - name: Run integration tests
        id: test
        run: |
          set +e
          bash scripts/test_all.sh 2>&1 | tee test_output.txt
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit $exit_code

      - name: Post test summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('test_output.txt', 'utf8');
            const exitCode = '${{ steps.test.outputs.exit_code }}';
            const status = exitCode === '0' ? '✅ All integration tests passed' : `❌ ${exitCode} test suite(s) failed`;

            const body = `## Integration Test Results

            ${status}

            <details>
            <summary>Full output</summary>

            \`\`\`
            ${output.split('\n').slice(-100).join('\n')}
            \`\`\`

            </details>`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Integration Test Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
