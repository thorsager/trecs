name: golangci-lint

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches:
      - 'main'

permissions:
  contents: read
  pull-requests: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ^1.26

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
